version: "3.9"

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/sakn.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-not-for-production-use-only}
      - REDIS_URL=redis://redis:6379/0
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=http://localhost:5173,http://localhost:8000
      - RATE_LIMIT_STORAGE=redis
    ports:
      - "8000:8000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./src/backend:/app/src:ro
      - sqlite_data:/app/data
    networks:
      - sakn-internal
      - sakn-public
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sakn-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  sakn-internal:
    internal: true
  sakn-public:

volumes:
  redis_data:
  sqlite_data:
